apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: KarpenterNodeRole-prod-eks-cluster

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: prod-eks-cluster

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: prod-eks-cluster

  amiFamily: AL2023