apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: external-dns
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/vinoinbox1-coder/helm.git
    targetRevision: HEAD
    path: helm-charts/external-dns

    helm:
      values: |
        provider:
          name: aws

        aws:
          region: us-east-1

        txtOwnerId: prod-eks-cluster

        policy: sync

        serviceAccount:
          create: true
          name: external-dns

          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::757933576142:role/external-dns

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true