apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: t3-micro-only
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.micro"]

        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]

  limits:
    cpu: "8"