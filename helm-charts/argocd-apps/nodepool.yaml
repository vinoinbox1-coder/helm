apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: mixed-instance-pool
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.micro
            - t3.small
            - c7i-flex.large
            - m7i-flex.large

        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]

  limits:
    cpu: "100"