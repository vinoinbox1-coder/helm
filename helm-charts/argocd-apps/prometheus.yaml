apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: kube-prometheus-stack
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/vinoinbox1-coder/helm.git
    targetRevision: HEAD
    path: helm-charts/kube-prometheus-stack

    helm:
      valuesObject:

        grafana:
          adminPassword: admin123

          ingress:
            enabled: true
            ingressClassName: alb

            annotations:
              alb.ingress.kubernetes.io/scheme: internet-facing
              alb.ingress.kubernetes.io/target-type: ip

            hosts:
              - grafana.local

        prometheus:
          prometheusSpec:
            retention: 7d

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
