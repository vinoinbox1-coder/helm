{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: {{ .Chart.Name }}

  annotations:
{{ toYaml .Values.ingress.annotations | indent 4 }}

spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: {{ .Chart.Name }}

                port:
                  number: {{ .Values.service.port }}

{{- end }}