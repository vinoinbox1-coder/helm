{{- if .Values.persistence.enabled }}

apiVersion: storage.k8s.io/v1
kind: StorageClass

metadata:
  name: {{ .Values.persistence.storageClass }}

provisioner: efs.csi.aws.com

parameters:
  provisioningMode: {{ .Values.persistence.provisioningMode }}
  fileSystemId: {{ .Values.persistence.fileSystemId }}
  directoryPerms: "{{ .Values.persistence.directoryPerms }}"

mountOptions:
{{- range .Values.persistence.mountOptions }}
  - {{ . }}
{{- end }}

reclaimPolicy: {{ .Values.persistence.reclaimPolicy }}

volumeBindingMode: {{ .Values.persistence.volumeBindingMode }}

{{- end }}