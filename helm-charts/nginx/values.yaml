replicaCount: 1

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false

  className: alb

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

  hosts:
    - host: nginx.yourdomain.com
      paths:
        - path: /
          pathType: Prefix

persistence:
  enabled: true

  # StorageClass name
  storageClass: efs-sc

  # PVC settings
  accessMode: ReadWriteMany
  size: 10Gi

  # Existing PVC name
  existingClaim: nginx-app-pvc

  # Container mount path
  mountPath: /usr/share/nginx/html

resources: {}