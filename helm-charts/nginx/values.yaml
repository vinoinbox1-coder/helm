# =========================================================
# POD / APPLICATION CONFIGURATION
# =========================================================

replicaCount: 1

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

resources: {}

service:
  type: ClusterIP
  port: 80

# =========================================================
# INGRESS / ALB CONFIGURATION
# =========================================================

ingress:
  enabled: true

  className: alb

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

# # =========================================================
# # PERSISTENT VOLUME CLAIM (PVC) CONFIGURATION
# # =========================================================

persistence:
  enabled: false

#   # Existing PVC name
#   existingClaim: nginx-app-pvc

#   # PVC settings
#   accessMode: ReadWriteMany
#   size: 10Gi

#   # Container mount path
#   mountPath: /usr/share/nginx/html


